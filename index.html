<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decent Health</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #4ade80;
    --accent2: #f59e0b;
    --danger: #f87171;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --text3: #5a5f7a;
    --radius: 12px;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .nav { display: flex; gap: 4px; }

  .nav-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--surface2); color: var(--accent); }

  .main { padding: 24px; max-width: 1100px; margin: 0 auto; }

  .page { display: none; }
  .page.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.good { color: var(--accent); }
  .stat-value.warn { color: var(--accent2); }
  .stat-value.bad  { color: var(--danger); }

  .stat-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  .chart-wrap {
    position: relative;
    height: 280px;
  }

  .entry-form {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  input[type="date"],
  input[type="number"],
  input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0f1117;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 20px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn:hover { opacity: 0.85; }

  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  th {
    text-align: right;
    padding: 8px 12px;
    color: var(--text3);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--border);
  }

  th:first-child { text-align: left; }

  td {
    padding: 9px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
  }

  td:first-child { text-align: left; color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .positive { color: var(--accent); }
  .negative { color: var(--danger); }
  .neutral  { color: var(--text2); }

  .streak-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .streak-pos { background: rgba(74,222,128,0.15); color: var(--accent); }
  .streak-neg { background: rgba(248,113,113,0.15); color: var(--danger); }

  .config-row {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
    align-items: start;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .config-row:last-child { border-bottom: none; }

  .config-desc {
    font-size: 12px;
    color: var(--text3);
    padding-top: 10px;
    line-height: 1.5;
  }

  .save-msg {
    font-size: 12px;
    color: var(--accent);
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .save-msg.show { opacity: 1; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--accent); }
  .toast.error   { border-color: var(--danger); }

  .loading {
    text-align: center;
    color: var(--text3);
    padding: 40px;
    font-size: 13px;
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">Decent <span>Health</span></div>
  <nav class="nav">
    <button class="nav-btn active" data-page="weight" onclick="showPage('weight', this)">Weight</button>
    <button class="nav-btn" data-page="admin" onclick="showPage('admin', this)">Admin</button>
  </nav>
</header>

<div class="main">

  <!-- WEIGHT PAGE -->
  <div id="page-weight" class="page active">

    <div class="card">
      <div class="card-title">Log Weight</div>
      <div class="entry-form">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="entry-date" />
        </div>
        <div class="form-group">
          <label>Weight (lbs)</label>
          <input type="number" id="entry-weight" step="0.1" min="100" max="500" placeholder="e.g. 238.5" style="width:140px" />
        </div>
        <button class="btn" onclick="saveWeight()">Save</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Weight</div>
        <div class="stat-value" id="stat-today">—</div>
        <div class="stat-sub" id="stat-today-date"></div>
      </div>
      <div class="stat">
        <div class="stat-label">Rolling Avg</div>
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-sub" id="stat-avg-sub"></div>
      </div>
      <div class="stat">
        <div class="stat-label">vs Average</div>
        <div class="stat-value" id="stat-vs-avg">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Target</div>
        <div class="stat-value" id="stat-target">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">vs Target</div>
        <div class="stat-value" id="stat-vs-target">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Streak</div>
        <div class="stat-value" id="stat-streak">—</div>
        <div class="stat-sub">vs rolling avg</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        21-Day Window
        <span style="font-family:var(--font-body);font-size:12px;color:var(--text3);font-weight:400;margin-left:8px">14 days back · 7 days forward</span>
      </div>
      <div class="chart-wrap">
        <canvas id="weight-chart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Recent Log</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Weight</th>
              <th>Avg (<span id="th-avg-days">14</span>d)</th>
              <th>vs Avg</th>
              <th>Target</th>
              <th>vs Target</th>
              <th>Streak</th>
            </tr>
          </thead>
          <tbody id="weight-table-body">
            <tr><td colspan="7" class="loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div id="page-admin" class="page">
    <div class="card">
      <div class="card-title">App Configuration</div>
      <div id="config-grid">
        <div class="loading">Loading…</div>
      </div>
      <div style="margin-top:20px">
        <button class="btn" onclick="saveConfig()">Save Changes</button>
        <div class="save-msg" id="save-msg">✓ Configuration saved</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ntrhptxetvdjhoqfaytl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50cmhwdHhldHZkamhvcWZheXRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTc2NDQsImV4cCI6MjA5NTIzMzY0NH0.dWpCNGNtUMAqFC3S22s-xxIUMYWyH9TnPwAhyVYuhqk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let config = {};
let logs = [];
let chart = null;

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  setDefaultDate();
  await loadConfig();
  await loadLogs();
  renderAll();
});

function setDefaultDate() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('entry-date').value = today;
  document.getElementById('entry-date').max = today;
}

// ── Config ────────────────────────────────────────────────
async function loadConfig() {
  const { data, error } = await sb.from('health_config').select('*');
  if (error) { showToast('Error loading config', 'error'); return; }
  config = {};
  (data || []).forEach(r => config[r.key] = r);
}

function getVal(key, fallback) {
  return config[key] ? parseFloat(config[key].value) : fallback;
}

// ── Logs ──────────────────────────────────────────────────
async function loadLogs() {
  const { data, error } = await sb
    .from('weight_logs')
    .select('*')
    .order('log_date', { ascending: true });
  if (error) { showToast('Error loading logs', 'error'); return; }
  logs = data || [];
}

async function saveWeight() {
  const dateVal = document.getElementById('entry-date').value;
  const wtVal   = parseFloat(document.getElementById('entry-weight').value);

  if (!dateVal) { showToast('Please select a date', 'error'); return; }
  if (isNaN(wtVal) || wtVal < 100 || wtVal > 500) {
    showToast('Please enter a valid weight (100–500)', 'error'); return;
  }

  const { error } = await sb.from('weight_logs').upsert(
    { log_date: dateVal, weight: wtVal },
    { onConflict: 'log_date' }
  );

  if (error) { showToast('Error saving: ' + error.message, 'error'); return; }

  showToast('Weight saved ✓', 'success');
  document.getElementById('entry-weight').value = '';
  await loadLogs();
  renderAll();
}

// ── Calculations ──────────────────────────────────────────
function buildRows() {
  const avgWindow = getVal('rolling_avg_days', 14);
  const frozen    = getVal('frozen_target', 235);
  const goal      = getVal('goal', 220);
  const commit    = getVal('commit', 0.25);
  const dailyDrop = commit / 7;

  if (!logs.length) return [];

  // Build date-keyed map of actual weights
  const logMap = {};
  logs.forEach(l => { logMap[l.log_date] = parseFloat(l.weight); });

  // Date range: first log date → today + 7
  const startDate = new Date(logs[0].log_date + 'T00:00:00');
  const endDate   = new Date();
  endDate.setDate(endDate.getDate() + 7);

  // Build continuous date array
  const allDates = [];
  const cur = new Date(startDate);
  while (cur <= endDate) {
    allDates.push(cur.toISOString().split('T')[0]);
    cur.setDate(cur.getDate() + 1);
  }

  // Build rows with target
  // Target: starts at frozen, drops dailyDrop/day once > frozen, floors at goal
  // Per spec: if prevTarget <= frozen → stay at frozen (frozen mode)
  // Since we start at frozen and frozen mode keeps it there, it only drops
  // when user raises frozen_target above current running target.
  const rows = [];
  let prevTarget = null;

  allDates.forEach(date => {
    let target;
    if (prevTarget === null) {
      target = frozen;
    } else if (prevTarget <= frozen) {
      target = frozen;
    } else {
      target = Math.max(goal, prevTarget - dailyDrop);
    }

    const weight = logMap[date] !== undefined ? logMap[date] : null;
    rows.push({ date, weight, target, isFuture: weight === null });
    prevTarget = target;
  });

  // Rolling average: only over rows that have actual weights
  // For each row, look back avgWindow actual weight entries
  const weightedRows = rows.filter(r => r.weight !== null);

  rows.forEach(row => {
    if (row.weight !== null) {
      const idx = weightedRows.findIndex(w => w.date === row.date);
      const slice = weightedRows.slice(Math.max(0, idx - avgWindow + 1), idx + 1);
      row.avg = slice.reduce((s, r) => s + r.weight, 0) / slice.length;
      row.vsAvg    = row.weight - row.avg;
      row.vsTarget = row.weight - row.target;
    } else {
      // Future: project avg flat from last known
      if (weightedRows.length) {
        row.avg = weightedRows[weightedRows.length - 1].avg || null;
      } else {
        row.avg = null;
      }
      row.vsAvg    = null;
      row.vsTarget = null;
    }
  });

  // Streak: consecutive days under/over rolling avg
  let streak = 0;
  rows.forEach((row, i) => {
    if (row.weight === null) { row.streak = null; return; }
    const isUnder = row.vsAvg <= 0;
    if (i === 0 || rows[i - 1].streak === null) {
      streak = isUnder ? 1 : -1;
    } else {
      const prevStreak = rows[i - 1].streak;
      const wasUnder   = prevStreak > 0;
      if (wasUnder === isUnder) {
        streak = isUnder ? prevStreak + 1 : prevStreak - 1;
      } else {
        streak = isUnder ? 1 : -1;
      }
    }
    row.streak = streak;
  });

  return rows;
}

// ── Render ────────────────────────────────────────────────
function renderAll() {
  const rows = buildRows();
  const avgDays = getVal('rolling_avg_days', 14);
  document.getElementById('th-avg-days').textContent = avgDays;
  renderStats(rows);
  renderChart(rows);
  renderTable(rows);
}

function renderStats(rows) {
  const fmt = v => v != null ? v.toFixed(1) : '—';
  const fmtDiff = v => {
    if (v == null) return { text: '—', cls: '' };
    return { text: (v > 0 ? '+' : '') + v.toFixed(1), cls: v <= 0 ? 'good' : 'bad' };
  };

  // Use most recent row with actual weight
  const lastRow = [...rows].reverse().find(r => r.weight !== null);
  if (!lastRow) return;

  const d = new Date(lastRow.date + 'T00:00:00');
  const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  document.getElementById('stat-today').textContent = fmt(lastRow.weight);
  document.getElementById('stat-today-date').textContent = dateStr;
  document.getElementById('stat-avg').textContent = fmt(lastRow.avg);
  document.getElementById('stat-avg-sub').textContent = getVal('rolling_avg_days', 14) + '-day avg';
  document.getElementById('stat-target').textContent = fmt(lastRow.target);

  const vsAvg = fmtDiff(lastRow.vsAvg);
  const elVsAvg = document.getElementById('stat-vs-avg');
  elVsAvg.textContent = vsAvg.text;
  elVsAvg.className = 'stat-value ' + vsAvg.cls;

  const vsTgt = fmtDiff(lastRow.vsTarget);
  const elVsTgt = document.getElementById('stat-vs-target');
  elVsTgt.textContent = vsTgt.text;
  elVsTgt.className = 'stat-value ' + vsTgt.cls;

  const elStreak = document.getElementById('stat-streak');
  if (lastRow.streak != null) {
    elStreak.textContent = (lastRow.streak > 0 ? '+' : '') + lastRow.streak + 'd';
    elStreak.className = 'stat-value ' + (lastRow.streak > 0 ? 'good' : 'bad');
  } else {
    elStreak.textContent = '—';
    elStreak.className = 'stat-value';
  }
}

function renderChart(rows) {
  const today = new Date().toISOString().split('T')[0];
  const todayIdx = rows.findIndex(r => r.date === today);
  if (todayIdx === -1) return;

  const start   = Math.max(0, todayIdx - 14);
  const end     = Math.min(rows.length, todayIdx + 8);
  const window  = rows.slice(start, end);
  const todayMark = window.findIndex(r => r.date === today);

  const labels  = window.map(r => {
    const d = new Date(r.date + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  });

  const weights = window.map(r => r.weight != null ? +r.weight.toFixed(1) : null);
  const avgs    = window.map(r => r.avg    != null ? +r.avg.toFixed(1)    : null);
  const targets = window.map(r => r.target != null ? +r.target.toFixed(2) : null);

  if (chart) chart.destroy();

  const todayLinePlugin = {
    id: 'todayLine',
    afterDraw(ch) {
      if (todayMark < 0) return;
      const x = ch.scales.x.getPixelForIndex(todayMark);
      const { top, bottom } = ch.scales.y;
      const ctx = ch.ctx;
      ctx.save();
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(74,222,128,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.stroke();
      ctx.restore();
    }
  };

  const ctx = document.getElementById('weight-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Weight',
          data: weights,
          borderColor: '#e8eaf0',
          backgroundColor: 'rgba(232,234,240,0.06)',
          pointBackgroundColor: '#e8eaf0',
          pointRadius: 4,
          pointHoverRadius: 6,
          borderWidth: 2,
          tension: 0.3,
          spanGaps: false,
        },
        {
          label: 'Rolling Avg',
          data: avgs,
          borderColor: '#4ade80',
          backgroundColor: 'transparent',
          pointRadius: 0,
          borderWidth: 2,
          tension: 0.4,
          spanGaps: true,
        },
        {
          label: 'Target',
          data: targets,
          borderColor: '#f59e0b',
          backgroundColor: 'transparent',
          pointRadius: 0,
          borderWidth: 1.5,
          tension: 0,
          spanGaps: true,
          borderDash: [5, 3],
        }
      ]
    },
    plugins: [todayLinePlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            color: '#8b90a7',
            font: { family: 'DM Sans', size: 12 },
            boxWidth: 16,
            padding: 16,
          }
        },
        tooltip: {
          backgroundColor: '#1a1d27',
          borderColor: '#2e3250',
          borderWidth: 1,
          titleColor: '#e8eaf0',
          bodyColor: '#8b90a7',
          callbacks: {
            label: ctx => {
              const v = ctx.raw;
              if (v == null) return null;
              return ` ${ctx.dataset.label}: ${v.toFixed(1)}`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#2e3250' },
          ticks: { color: '#5a5f7a', font: { family: 'DM Sans', size: 11 } }
        },
        y: {
          grid: { color: '#2e3250' },
          ticks: {
            color: '#5a5f7a',
            font: { family: 'DM Sans', size: 11 },
            callback: v => v.toFixed(0)
          }
        }
      }
    }
  });
}

function renderTable(rows) {
  const withWeight = rows.filter(r => r.weight != null).reverse().slice(0, 30);
  const tbody = document.getElementById('weight-table-body');

  if (!withWeight.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="loading">No entries yet — log your first weight above.</td></tr>';
    return;
  }

  const fmt = v => v != null ? v.toFixed(1) : '—';
  const fmtDiff = v => {
    if (v == null) return '<span class="neutral">—</span>';
    const cls = v <= 0 ? 'positive' : 'negative';
    return `<span class="${cls}">${v > 0 ? '+' : ''}${v.toFixed(1)}</span>`;
  };

  tbody.innerHTML = withWeight.map(r => {
    const d = new Date(r.date + 'T00:00:00');
    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const streakHtml = r.streak != null
      ? `<span class="streak-badge ${r.streak > 0 ? 'streak-pos' : 'streak-neg'}">${r.streak > 0 ? '+' : ''}${r.streak}</span>`
      : '—';

    return `<tr>
      <td>${dateStr}</td>
      <td>${fmt(r.weight)}</td>
      <td>${fmt(r.avg)}</td>
      <td>${fmtDiff(r.vsAvg)}</td>
      <td>${fmt(r.target)}</td>
      <td>${fmtDiff(r.vsTarget)}</td>
      <td>${streakHtml}</td>
    </tr>`;
  }).join('');
}

// ── Admin ─────────────────────────────────────────────────
async function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'admin') {
    await loadConfig();
    renderAdmin();
  }
}

function renderAdmin() {
  const grid = document.getElementById('config-grid');
  const order = ['rolling_avg_days', 'frozen_target', 'goal', 'commit'];

  if (!Object.keys(config).length) {
    grid.innerHTML = '<div class="loading">No config found.</div>';
    return;
  }

  grid.innerHTML = order.map(key => {
    const row = config[key];
    if (!row) return '';
    return `<div class="config-row">
      <div class="form-group">
        <label>${row.label}</label>
        <input type="number" id="cfg-${key}" value="${row.value}" step="any" style="width:140px" />
      </div>
      <div class="config-desc">${row.description || ''}</div>
    </div>`;
  }).join('');
}

async function saveConfig() {
  const order = ['rolling_avg_days', 'frozen_target', 'goal', 'commit'];
  const updates = order.map(key => {
    const el = document.getElementById('cfg-' + key);
    if (!el) return null;
    return {
      key,
      value: el.value,
      label: config[key]?.label || key,
      description: config[key]?.description || ''
    };
  }).filter(Boolean);

  const { error } = await sb.from('health_config').upsert(updates, { onConflict: 'key' });
  if (error) { showToast('Error saving config', 'error'); return; }

  await loadConfig();
  renderAll();

  const msg = document.getElementById('save-msg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 2500);
  showToast('Config saved ✓', 'success');
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { t.className = 'toast'; }, 2800);
}
</script>
